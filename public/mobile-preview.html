<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mobile Vorschau - The Barber Rendsburg</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #17130f;
        color: #f7f1e7;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .preview-shell {
        display: grid;
        gap: 14px;
        justify-items: center;
      }

      .preview-toolbar {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
      }

      .preview-button {
        min-height: 36px;
        padding: 0 12px;
        color: #f7f1e7;
        background: rgba(247, 241, 231, 0.08);
        border: 1px solid rgba(247, 241, 231, 0.2);
        border-radius: 8px;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        font-weight: 700;
      }

      .preview-button[aria-pressed="true"] {
        color: #17130f;
        background: #c99a4a;
        border-color: #c99a4a;
      }

      .phone-frame {
        width: min(var(--phone-width, 390px), calc(100vw - 32px));
        height: min(844px, calc(100vh - 104px));
        overflow: hidden;
        background: #050504;
        border: 10px solid #080706;
        border-radius: 34px;
        box-shadow:
          0 26px 70px rgba(0, 0, 0, 0.46),
          0 0 0 1px rgba(255, 255, 255, 0.1);
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #8a5934;
      }
    </style>
  </head>
  <body>
    <main class="preview-shell">
      <div class="preview-toolbar" aria-label="Mobile Breite auswählen">
        <button class="preview-button" type="button" data-width="375">
          iPhone 375
        </button>
        <button
          class="preview-button"
          type="button"
          data-width="390"
          aria-pressed="true"
        >
          iPhone 390
        </button>
        <button class="preview-button" type="button" data-width="430">
          Groß 430
        </button>
      </div>
      <div class="phone-frame" id="phone-frame">
        <iframe
          src="http://localhost:3000/"
          title="Mobile Website Vorschau"
        ></iframe>
      </div>
    </main>

    <script>
      const frame = document.querySelector("#phone-frame");
      const buttons = document.querySelectorAll("[data-width]");

      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          frame.style.setProperty("--phone-width", `${button.dataset.width}px`);
          buttons.forEach((item) => item.setAttribute("aria-pressed", "false"));
          button.setAttribute("aria-pressed", "true");
        });
      });
    </script>
  </body>
</html>
