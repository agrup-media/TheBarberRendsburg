<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" role="img" aria-label="The Barber Rendsburg">
  <defs>
    <filter id="rough-carve" x="-8%" y="-18%" width="116%" height="136%">
      <feTurbulence type="fractalNoise" baseFrequency="0.028 0.11" numOctaves="3" seed="19" result="grain"/>
      <feDisplacementMap in="SourceGraphic" in2="grain" scale="2.6" xChannelSelector="R" yChannelSelector="G" result="rough"/>
      <feGaussianBlur in="rough" stdDeviation="0.35" result="soft"/>
      <feOffset in="soft" dx="1.8" dy="2.2" result="lower-shadow"/>
      <feOffset in="soft" dx="-1.1" dy="-1.2" result="upper-cut"/>
      <feMerge>
        <feMergeNode in="lower-shadow"/>
        <feMergeNode in="upper-cut"/>
        <feMergeNode in="rough"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#rough-carve)" font-family="Permanent Marker, Marker Felt, Brush Script MT, Comic Sans MS, cursive" font-weight="700" font-style="italic" letter-spacing="6" text-anchor="middle">
    <text x="450" y="112" font-size="78" fill="#FFFFFF" stroke="rgba(17, 10, 6, 0.72)" stroke-width="2.4">THE BARBER</text>
    <text x="450" y="112" font-size="78" fill="none" stroke="#FFFFFF" stroke-opacity="0.26" stroke-width="4.2">THE BARBER</text>
    <text x="450" y="200" font-size="62" fill="#FFFFFF" stroke="rgba(17, 10, 6, 0.72)" stroke-width="2">RENDSBURG</text>
    <text x="450" y="200" font-size="62" fill="none" stroke="#FFFFFF" stroke-opacity="0.24" stroke-width="3.5">RENDSBURG</text>
  </g>
</svg>
